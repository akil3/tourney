<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#E84E1B"/>
    </linearGradient>
    <linearGradient id="ball5" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0e8dd"/>
    </linearGradient>
    <filter id="glow5">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="115" fill="url(#bg5)"/>
  <!-- Volleyball -->
  <circle cx="256" cy="220" r="115" fill="url(#ball5)" filter="url(#glow5)"/>
  <!-- Volleyball seam lines -->
  <path d="M141 220 C180 180, 332 180, 371 220" fill="none" stroke="#FF6B35" stroke-width="5" opacity="0.4"/>
  <path d="M141 220 C180 260, 332 260, 371 220" fill="none" stroke="#FF6B35" stroke-width="5" opacity="0.4"/>
  <path d="M256 105 C220 155, 220 285, 256 335" fill="none" stroke="#FF6B35" stroke-width="5" opacity="0.4"/>
  <!-- Flame accent -->
  <path d="M176 370 Q194 340, 212 356 Q230 325, 256 348 Q282 325, 300 356 Q318 340, 336 370 Q300 400, 256 396 Q212 400, 176 370Z" fill="white" opacity="0.9"/>
  <!-- Brand text -->
  <text x="256" y="460" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="42" fill="white" letter-spacing="12" opacity="0.95">TOURNEY</text>
